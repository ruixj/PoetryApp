version: '3.8'

services:
  # ── MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: poetry-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: poetry_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot@123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Nacos (service discovery + config center) ─────────────
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: poetry-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15

  # ── Gateway ───────────────────────────────────────────────
  gateway:
    build: ./backend/gateway
    container_name: poetry-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./logs/gateway:/app/logs

  # ── Auth Service ──────────────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: poetry-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/auth:/app/logs
      - ./uploads:/app/uploads

  # ── User Service ──────────────────────────────────────────
  user-service:
    build: ./backend/user-service
    container_name: poetry-user
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/user:/app/logs
      - ./uploads:/app/uploads

  # ── Poetry Service ────────────────────────────────────────
  poetry-service:
    build: ./backend/poetry-service
    container_name: poetry-poetry
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/poetry:/app/logs
      - ./uploads:/app/uploads

  # ── Game Service ──────────────────────────────────────────
  game-service:
    build: ./backend/game-service
    container_name: poetry-game
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/game:/app/logs

  # ── Shop Service ──────────────────────────────────────────
  shop-service:
    build: ./backend/shop-service
    container_name: poetry-shop
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/shop:/app/logs

  # ── Admin Service ─────────────────────────────────────────
  admin-service:
    build: ./backend/admin-service
    container_name: poetry-admin
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: root@123
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./logs/admin:/app/logs
      - ./uploads:/app/uploads

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: poetry-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  mysql_data:
