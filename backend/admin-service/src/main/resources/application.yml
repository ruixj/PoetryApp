server:
  port: 8086

spring:
  application:
    name: admin-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/poetry_app?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.poetryapp.admin.entity

upload:
  path: ${UPLOAD_PATH:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
